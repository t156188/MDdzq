name: Windows Build

on:
  push:
    branches: [main]
    paths:
      - 'win/**'
      - 'mac/Resources/**'
      - 'mac/build-web/**'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            win/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('win/src-tauri/Cargo.lock') }}

      # Build the shared front-end vendor bundle (markdown-it / hljs / katex / mermaid).
      - name: Build viewer vendor bundle
        working-directory: mac/build-web
        run: |
          npm install
          npm run build

      - name: Install tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Windows installer
        working-directory: win/src-tauri
        run: cargo tauri build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: MDReader-Setup
          path: |
            win/src-tauri/target/release/bundle/nsis/*.exe
            win/src-tauri/target/release/bundle/nsis/*.msi
