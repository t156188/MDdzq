<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MDReader</title>
    <link rel="stylesheet" href="vendor/katex.min.css" />
    <link id="hljs-theme" rel="stylesheet" href="vendor/hljs-light.css" />
    <link rel="stylesheet" href="viewer.css" />
  </head>
  <body>
    <main id="root" class="markdown-body"></main>
    <script src="vendor/viewer.bundle.js"></script>
    <script>
      // Swap highlight.js theme when the page theme flips.
      const themeLink = document.getElementById('hljs-theme');
      const observer = new MutationObserver(() => {
        const dark = document.documentElement.dataset.theme === 'dark';
        themeLink.href = dark ? 'vendor/hljs-dark.css' : 'vendor/hljs-light.css';
      });
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    </script>
  </body>
</html>
