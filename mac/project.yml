name: MDReader
options:
  bundleIdPrefix: com.lv
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  MDReader:
    type: application
    platform: macOS
    sources:
      - path: MDReader
        excludes:
          - "Info.plist"
          - "MDReader.entitlements"
      - path: Resources
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lv.mdreader
        PRODUCT_NAME: MDGEM
        INFOPLIST_FILE: MDReader/Info.plist
        CODE_SIGN_ENTITLEMENTS: MDReader/MDReader.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
